apply plugin: 'com.android.application'

android {
    defaultConfig {
        applicationId "uk.coko.forge.kokey"
        compileSdk 36
        minSdkVersion 24
        targetSdkVersion 36
        versionCode 7
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    namespace 'uk.coko.forge.kokey'
}

dependencies {
}
